<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a1a2e"/>
  <circle cx="64" cy="64" r="56" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <!-- Thermometer body -->
  <rect x="56" y="24" width="16" height="60" rx="8" fill="#0f3460"/>
  <!-- Thermometer bulb -->
  <circle cx="64" cy="90" r="16" fill="#0f3460"/>
  <circle cx="64" cy="90" r="12" fill="#e94560"/>
  <!-- Mercury column -->
  <rect x="59" y="44" width="10" height="42" rx="5" fill="#e94560"/>
  <!-- Temperature marks -->
  <rect x="74" y="32" width="8" height="2" rx="1" fill="#aaaaaa"/>
  <rect x="74" y="42" width="8" height="2" rx="1" fill="#aaaaaa"/>
  <rect x="74" y="52" width="8" height="2" rx="1" fill="#aaaaaa"/>
  <rect x="74" y="62" width="8" height="2" rx="1" fill="#aaaaaa"/>
  <rect x="74" y="72" width="8" height="2" rx="1" fill="#aaaaaa"/>
</svg>
