<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- CPU chip body -->
  <rect x="14" y="14" width="100" height="100" rx="14" fill="#58a6ff"/>
  <!-- Chip pins - top -->
  <rect x="32" y="0" width="12" height="20" rx="5" fill="#58a6ff"/>
  <rect x="58" y="0" width="12" height="20" rx="5" fill="#58a6ff"/>
  <rect x="84" y="0" width="12" height="20" rx="5" fill="#58a6ff"/>
  <!-- Chip pins - bottom -->
  <rect x="32" y="108" width="12" height="20" rx="5" fill="#58a6ff"/>
  <rect x="58" y="108" width="12" height="20" rx="5" fill="#58a6ff"/>
  <rect x="84" y="108" width="12" height="20" rx="5" fill="#58a6ff"/>
  <!-- Chip pins - left -->
  <rect x="0" y="32" width="20" height="12" rx="5" fill="#58a6ff"/>
  <rect x="0" y="58" width="20" height="12" rx="5" fill="#58a6ff"/>
  <rect x="0" y="84" width="20" height="12" rx="5" fill="#58a6ff"/>
  <!-- Chip pins - right -->
  <rect x="108" y="32" width="20" height="12" rx="5" fill="#58a6ff"/>
  <rect x="108" y="58" width="20" height="12" rx="5" fill="#58a6ff"/>
  <rect x="108" y="84" width="20" height="12" rx="5" fill="#58a6ff"/>
  <!-- Pulse line -->
  <polyline points="24,64 40,64 48,36 56,92 64,28 72,96 80,38 88,64 104,64"
    stroke="#ffffff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
