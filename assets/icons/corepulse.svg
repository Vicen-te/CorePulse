<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="#1a1a2e"/>
  <!-- CPU chip body -->
  <rect x="34" y="34" width="60" height="60" rx="8" fill="#16213e"/>
  <rect x="40" y="40" width="48" height="48" rx="5" fill="#0f3460"/>
  <!-- Chip pins - top -->
  <rect x="48" y="26" width="5" height="12" rx="2" fill="#533483"/>
  <rect x="62" y="26" width="5" height="12" rx="2" fill="#533483"/>
  <rect x="76" y="26" width="5" height="12" rx="2" fill="#533483"/>
  <!-- Chip pins - bottom -->
  <rect x="48" y="90" width="5" height="12" rx="2" fill="#533483"/>
  <rect x="62" y="90" width="5" height="12" rx="2" fill="#533483"/>
  <rect x="76" y="90" width="5" height="12" rx="2" fill="#533483"/>
  <!-- Chip pins - left -->
  <rect x="26" y="48" width="12" height="5" rx="2" fill="#533483"/>
  <rect x="26" y="62" width="12" height="5" rx="2" fill="#533483"/>
  <rect x="26" y="76" width="12" height="5" rx="2" fill="#533483"/>
  <!-- Chip pins - right -->
  <rect x="90" y="48" width="12" height="5" rx="2" fill="#533483"/>
  <rect x="90" y="62" width="12" height="5" rx="2" fill="#533483"/>
  <rect x="90" y="76" width="12" height="5" rx="2" fill="#533483"/>
  <!-- Heartbeat/pulse line across the chip -->
  <polyline points="42,64 52,64 56,52 60,76 64,48 68,80 72,56 76,64 86,64"
    stroke="#e94560" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Subtle glow on the pulse -->
  <polyline points="42,64 52,64 56,52 60,76 64,48 68,80 72,56 76,64 86,64"
    stroke="#e94560" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.25"/>
</svg>
